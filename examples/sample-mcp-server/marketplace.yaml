apiVersion: ai.anz.com/v1
kind: AgentCapability
metadata:
  name: payment-investigation-mcp
  version: 1.0.0
  owner: payments-platform
  supportChannel: "#payments-ai-support"
spec:
  type: mcp-server
  riskLevel: high
  dataClassification: confidential
  runtime:
    transport: stdio
    startCommand: "npm run start"
    authRequired: true
  capabilities:
    tools:
      - name: search_payment
        risk: read
      - name: replay_payment
        risk: destructive
        requiresHumanApproval: true
  security:
    requiresAuditLogging: true
  eval:
    casesFile: eval-cases.yaml
    minimumScore: 85
